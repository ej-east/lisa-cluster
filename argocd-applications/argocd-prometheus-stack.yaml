apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 82.18.0
      helm:
        valueFiles:
          - $values/manifests/grafana/values.yaml
    - repoURL: https://github.com/ej-east/lisa-cluster
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/ej-east/lisa-cluster
      targetRevision: HEAD
      path: manifests/grafana/manifests
  destination:
    server: "https://kubernetes.default.svc"
    namespace: grafana
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
