repos:
  - repo: local
    hooks:
      - id: kubeconform-check
        name: Kubeconform validation
        entry: scripts/kubeconform-check.sh
        language: script
        types: [yaml]
  - repo: local
    hooks:
      - id: yamlfmt
        name: YAML format
        entry: yamlfmt
        language: script
        types: [yaml]
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.23.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional@20.5.0"]

