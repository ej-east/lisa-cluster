apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: wireguard-client
  name: wireguard-client
  namespace: wireguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wireguard-client
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: wireguard-client
    spec:
      serviceAccountName: wireguard-sa
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: config-builder 
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              PRIVATE_KEY=$(cat /secrets/wireguard_client)
              # Resolve Traefik pod endpoint via K8s API
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              EP_JSON=$(wget -qO- --header="Authorization: Bearer ${TOKEN}" \
                "https://kubernetes.default.svc/api/v1/namespaces/kube-system/endpoints/traefik" \
                --no-check-certificate 2>/dev/null)
              # Extract first endpoint IP and named ports
              TRAEFIK_IP=$(echo "$EP_JSON" | sed 's/.*"ip":"\([0-9.]*\)".*/\1/')
              WEB_PORT=$(echo "$EP_JSON" | sed 's/.*"name":"web","port":\([0-9]*\).*/\1/')
              WEBSECURE_PORT=$(echo "$EP_JSON" | sed 's/.*"name":"websecure","port":\([0-9]*\).*/\1/')
              echo "Resolved Traefik endpoint: ${TRAEFIK_IP} web=${WEB_PORT} websecure=${WEBSECURE_PORT}"
              sed -e "s|# Inject Private Key and Traefik endpoint at runtime|PrivateKey = ${PRIVATE_KEY}|" \
                  -e "s|TRAEFIK_EP_WEB|${TRAEFIK_IP}:${WEB_PORT}|" \
                  -e "s|TRAEFIK_EP_WEBSECURE|${TRAEFIK_IP}:${WEBSECURE_PORT}|" \
                /config-template/wg0.conf.template > /config/wg0.conf
              chmod 600 /config/wg0.conf
          volumeMounts:
            - name: wireguard-secret
              mountPath: /secrets 
              readOnly: true 
            - name: config-template
              mountPath: /config-template/ 
              readOnly: true 
            - name: config 
              mountPath: /config 
      containers:
      - image: procustodibus/wireguard:latest
        name: wireguard
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
              - SYS_MODULE
          privileged: false 
        env:
          - name: LOG_CONFS
            value: "false"
        volumeMounts:
          - name: config 
            mountPath: /etc/wireguard
        resources:
          limits:
            memory: 128Mi
            cpu: 200m 
          requests:
            memory: 64Mi 
            cpu: 50m
      volumes:
        - name: wireguard-secret
          secret: 
            secretName: wireguard-vault-secrets
        - name: config-template
          configMap:
            name: wireguard-config 
        - name: config 
          emptyDir:
            medium: Memory
