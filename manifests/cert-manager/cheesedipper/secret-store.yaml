apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: cert-manager
spec:
  provider:
    vault:
      server: "http://hashicorp-vault.hashicorp-vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "cloudflare-role"
          serviceAccountRef:
            name: "cloudflare-sa"
