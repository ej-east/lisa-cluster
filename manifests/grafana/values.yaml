grafana:
  extraSecretMounts:
    - name: grafana-secret
      mountPath: /etc/secrets/grafana
      secretName: grafana-oidc-secret
      readOnly: true
  grafana.ini:
    server:
      domain: cheesedipper.com 
      root_url: https://grafana.cheesedipper.com
    auth.generic_oauth:
      enabled: true
      name: "Authentik"
      client_id: $__file{/etc/secrets/grafana/oidc_id}
      client_secret: $__file{/etc/secrets/grafana/oidc_secret}
      scopes: "openid profile email"
      auth_url: "https://authentik.cheesedipper.com/application/o/authorize/"
      token_url: "https://authentik.cheesedipper.com/application/o/token/"
      api_url: "https://authentik.cheesedipper.com/application/o/userinfo/"
      role_attribute_path: "contains(groups, 'sso_grafana_admins') && 'Admin' || contains(groups, 'sso_grafana_editors') && 'Editor' || 'Viewer'"
      email_attribute_path: "email"
      name_attribute_path: "name"
      login_attribute_path: "preferred_username"
      allow_sign_up: true
      skip_org_role_sync: false
