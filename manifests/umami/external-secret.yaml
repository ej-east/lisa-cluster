apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-secrets
  namespace: umami
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: umami-vault-secrets
    creationPolicy: Owner
  data:
    - secretKey: app_secret
      remoteRef:
        key: umami
        property: app_secret
    - secretKey: POSTGRES_DB
      remoteRef:
        key: umami
        property: POSTGRES_DB
    - secretKey: POSTGRES_USER
      remoteRef:
        key: umami
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: umami
        property: POSTGRES_PASSWORD
    - secretKey: DATABASE_URL
      remoteRef:
        key: umami
        property: DATABASE_URL
