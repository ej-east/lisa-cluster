apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: adguard
  name: adguard
  namespace: adguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: adguard
    spec:
      nodeSelector:
        kubernetes.io/hostname: lisa-node-2
      containers:
      - name: adguardhome
        image: adguard/adguardhome:v0.108.0-b.83
        ports:
        - containerPort: 443
          protocol: TCP
        - containerPort: 80
          protocol: TCP
        - containerPort: 3000
          protocol: TCP
        - containerPort: 68
          protocol: TCP
        - containerPort: 5443
          protocol: TCP
        - containerPort: 53
          protocol: TCP
        - containerPort: 53
          protocol: UDP
        - containerPort: 67
          protocol: UDP
        - containerPort: 68
          protocol: UDP
        - containerPort: 443
          protocol: UDP
        - containerPort: 784
          protocol: UDP
        - containerPort: 853
          protocol: UDP
        - containerPort: 8853
          protocol: UDP
        - containerPort: 5443
          protocol: UDP
        volumeMounts:
          - name:  work-data
            mountPath:  /opt/adguardhome/work
          - name:  conf-data
            mountPath:  /opt/adguardhome/conf
        resources:
          limits:
            cpu: 1
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
      volumes:
        - name: work-data
          persistentVolumeClaim:
            claimName: adguard-work-pvc
        - name: conf-data
          persistentVolumeClaim:
            claimName: adguard-conf-pvc


