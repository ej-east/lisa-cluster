apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd

spec:
  entryPoints:
    - web
  routes:
  - kind: Rule
    match: Host(`adguard.lisa`)

    observability:
      accessLogs: true
      metrics: true
      tracing: true

    services:
      - name: adguard
        port: 80