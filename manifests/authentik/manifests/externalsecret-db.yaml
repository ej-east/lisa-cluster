apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-db-secrets
  namespace: authentik
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: authentik-db-app
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: authentik
        property: postgresql_username 

    - secretKey: password
      remoteRef:
        key: authentik
        property: postgresql_password