apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: authentik-vault-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: authentik
        property: secret_key
    - secretKey: postgresql_password
      remoteRef:
        key: authentik
        property: postgresql_password
    - secretKey: postgresql_host
      remoteRef:
        key: authentik
        property: postgresql_host
    - secretKey: postgresql_port
      remoteRef:
        key: authentik
        property: postgresql_port
    - secretKey: postgresql_username
      remoteRef:
        key: authentik
        property: postgresql_username
    - secretKey: postgresql_name
      remoteRef:
        key: authentik
        property: postgresql_name
